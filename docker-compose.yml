services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: epati
      POSTGRES_USER: epati
      POSTGRES_PASSWORD: epati_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epati -d epati"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./e-pati-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://epati:epati_dev_password@postgres:5432/epati
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: local-compose-access-secret-please-replace-in-real-deploy
      JWT_REFRESH_SECRET: local-compose-refresh-secret-please-replace-in-real-deploy
      QR_TOKEN_SECRET: local-compose-qr-secret-please-replace-in-real-deploy
      CORS_ORIGINS: http://localhost:3001
      MAIL_FROM: VetCep <onboarding@resend.dev>
      NOTIFICATION_WORKER_ENABLED: "false"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  portal:
    build:
      context: ./portal
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3001"

volumes:
  postgres_data:
  redis_data:
